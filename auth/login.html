<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hirly</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-page">
        <!-- Left Decorative Side -->
        <div class="login-left">
            <img class="logo-topo" src="images/logo/hirly/logodecoleft.png" alt="decoration" />
        </div>

        <!-- Center Content -->
        <div class="login-center">
            <img class="logo-login" src="images/logo/hirly/logo.png" alt="Hirly" />
            
            <h1 class="login-title">
                Entre no Hir<span class="highlight">ly</span> e explore <span class="highlight">oportunidades</span>
            </h1>

            <form class="login-form">
                <div class="form-group">
                    <label for="username">Nome de usuário ou email</label>
                    <input type="text" id="username" class="form-input" placeholder="Digite seu usuário ou email" />
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" class="form-input" placeholder="Digite sua senha" />
                </div>

                <a href="#" class="forgot-password">Esqueceu o nome de usuário</a>

                <button type="button" class="btn-login" onclick="redirectLogin()">Explorar</button>
            </form>

            <div class="divider">ou</div>

            <div class="social-login">
                <img class="social-icon" src="frame-20.svg" alt="social login" />
            </div>
        </div>

        <!-- Right Decorative Side -->
        <div class="login-right">
            <img class="logo-rodape" src="images/logo/hirly/logodecoght.png" alt="decoration" />
        </div>
    </div>

    <script>
        function redirectLogin() {
            // Redirect to candidate home by default, can be customized based on user role
            window.location.href = "../routes/routepage.html";
        }
    </script>
</body>
</html>
