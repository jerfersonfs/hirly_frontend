<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hirly - Vagas em Destaque</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700;800;900&display=swap">
    <link rel="stylesheet" href="../../css/common.css">
    <link rel="stylesheet" href="css/home.css">
</head>
<body>
    <div class="app-container">

        <aside class="side-bar">
            <div class="sidebar-top">
                <a href="/auth/landingpage.html">
                    <img class="logo" src="images/logo/hirly/logo.png" alt="Hirly Logo" />
                </a>
            </div>
            
            <nav class="sidebar-menu">
                <span class="menu-title">Principal</span>
                <a href="home.html" class="menu-item">
                    <img src="images/icons/Home.png" alt="Início" /> <span>Início</span>
                </a>
                <a href="buscarcandidatos.html" class="menu-item">
                    <img src="images/icons/icone_lupa.png" alt="Pesquisar" /> <span>Pesquisar</span>
                </a>
                <a href="insightscadidato.html" class="menu-item">
                    <img src="images/icons/icone_dashboard.png" alt="Insights" /> <span>Insights</span>
                </a>

                <div class="menu-divider"></div>

                <span class="menu-title">Serviços</span>
                    <a href="curriculo.html" class="menu-item active">
                    <img src="images/icons/icone-Pasta.png" alt="Documento" /> <span>Documento</span>
                </a>
                
                <div class="menu-divider"></div>
                
                <span class="menu-title">Outros</span>
                <a href="../secundarias/configuracoescandidato.html" class="menu-item">
                    <img src="images/icons/Gear.png" alt="Configurações" /> <span>Configurações</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="card-usu">
                    <a href="../principais/perfilcandidato.html">
                        <img class="usuario-foto" src="images/user/Usuariofoto.png" alt="Foto do Usuário" />
                    </a>
                    <div class="nome-usuario">Marcelo</div>
                </div>
                <a href="../../auth/login.html" class="log-out-btn">
                    <img src="images/icons/SignOut.png" alt="Sair" /> <span>Log out</span>
                </a>
            </div>
        </aside>
        
        <main class="main-content">

            <header class="top-search-bar">
                <div class="pesquisa-wrapper">
                    <div class="search-input-container">
                        <img class="icone-lupa-input" src="images/icons/icone_lupa.png" alt="Lupa" />
                        <input type="text" placeholder="Encontre uma vaga" class="input-busca-real">
                    </div>
                    <button class="btn-filtrar">
                        <img class="icone-filtro" src="images/icons/filtro.png" alt="Filtro" />
                        <span>Filtrar</span>
                        <img class="seta-selecao" src="images/icons/seta_selecao.png" alt="Seta" />
                    </button>
                </div>
                <div class="user-avatar-top">
                    <img class="usuario-foto-top" src="images/user/Usuariofoto.png" alt="Avatar Usuário" />
                </div>
            </header>

            <section class="vagas-section">
                <div class="cabecalho-home">
                    <h1 class="vagas-em-destaque">Vagas em Destaque</h1>
                    <p class="subtitulo-vagas">Confira as oportunidades mais recentes e encontre a vaga ideal para você</p>
                </div>
                <div class="lista-card" id="jobs-container"></div>
            </section>
        </main>
    </div>
    <!-- JAVA SCRIPT SECTION -->
    <script src="js/mock.js"></script>
    <!--Renderizar vagas-->
    <script>
    function renderHomeJobs() {

        const container = document.getElementById("jobs-container");
        if (!container) return;

        container.innerHTML = candidateData.jobs.map(job => `
            <div class="vaga-card-item">
                <div class="vaga-main-info">
                    <img class="empresa-logo" src="${job.logo}" alt="${job.company}">
                    <div class="textos-vaga">
                        <h2 class="vaga-titulo-purple"> ${job.title} </h2>
                        <span class="empresa-nome">${job.company}</span>
                    </div>
                </div>
                <div class="vaga-meta-info">
                    <div class="meta-item">
                        <img class="meta-icon" src="images/icons/MapPin.png" alt="Localização">
                        <span class="meta-text"> ${job.location}</span>
                    </div>
                    <div class="meta-item">
                        <img class="meta-icon" src="images/icons/mala.png" alt="Salário">
                        <span class="meta-text">${job.salary}</span>
                    </div>
                </div>
            </div>
        `).join("");
    }
    renderHomeJobs();
    </script>
    <!--Animação da sidebar-->
    <script src="../../js/sidebar-active.js"></script>

    <script src="../../js/app.js"></script>
</body>
</html>
