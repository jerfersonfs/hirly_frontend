<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navegador do Projeto</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Menu lateral */
    .sidebar {
      width: 250px;
      background: #1e1e2f;
      color: white;
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 20px;
      text-align: center;
    }

    .sidebar ul {
      list-style: none;
    }

    .sidebar ul li {
      margin-bottom: 10px;
    }

    .sidebar ul li a {
      display: block;
      padding: 12px;
      background: #2d2d44;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      transition: 0.3s;
    }

    .sidebar ul li a:hover {
      background: #4b4b75;
    }

    /* Conteúdo principal */
    .content {
      flex: 1;
      background: #f4f4f4;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
    <link rel="stylesheet" href="css/common.css">
</head>
<body>

  <!-- Menu -->
  <div class="sidebar">
    <h2>Hirly</h2>

    <ul>
      <li><a href="auth/landingpage.html" target="viewer">Landing Page</a></li>
      <li><a href="auth/login.html" target="viewer">Login</a></li>
      <li><a href="cadastros/candidato/cadastrocandidato.html" target="viewer">Cadastro de Candidato</a></li>
      <li><a href="cadastros/empresa/cadastroempresa.html" target="viewer">Cadastro de Empresa</a></li>
      <li><a href="cadidato/principais/home.html" target="viewer">Home Candidato</a></li>
      <li><a href="empresa/principais/homeempresa.html" target="viewer">Home Empresa</a></li>
    </ul>
  </div>
    <script src="js/app.js"></script>
</body>
</html>
