<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hirly - Vagas em Destaque</title>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700;800;900&display=swap">
  <link rel="stylesheet" href="css/curriculo.css">
</head>

<body>
  <div class="app-container">
    <aside class="side-bar">
      <a href="/auth/landingpage.html">
        <img class="logo" src="images/logo/hirly/logo.png" alt="Hirly Logo" />
      </a>

      <nav class="sidebar-menu">
        <span class="menu-title">Principal</span>
        <a href="../principais/home.html" class="menu-item">
          <img src="images/icons/Home.png" alt="Início" /> <span>Início</span>
        </a>
        <a href="../principais/buscarcandidatos.html" class="menu-item">
          <img src="images/icons/icone_lupa.png" alt="Pesquisar" /> <span>Pesquisar</span>
        </a>
        <a href="../principais/insightscadidato.html" class="menu-item">
          <img src="images/icons/icone_dashboard.png" alt="Insights" /> <span>Insights</span>
        </a>

        <div class="menu-divider"></div>

        <span class="menu-title">Serviços</span>
        <a href="#" class="menu-item">
          <img src="images/icons/icone_Mensagem.png" alt="Mensagem" /> <span>Mensagem</span>
        </a>
        <a href="#" class="menu-item">
          <img src="images/icons/icone-Pasta.png" alt="Documento" /> <span>Documento</span>
        </a>

        <div class="menu-divider"></div>

        <span class="menu-title">Outros</span>
        <a href="#" class="menu-item">
          <img src="images/icons/icone_Ajuda.png" alt="Ajuda" /> <span>Ajuda</span>
        </a>
        <a href="../secundarias/configuracoescandidato.html" class="menu-item">
          <img src="images/icons/Gear.png" alt="Configurações" /> <span>Configurações</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="card-usu">
          <img class="usuario-foto" src="images/user/Usuariofoto.png" alt="Foto do Usuário" />
          <div class="nome-usuario">Marcelo</div>
        </div>
        <a href="../../auth/login.html" class="log-out-btn">
          <img src="images/icons/SignOut.png" alt="Sair" /> <span>Log out</span>
        </a>
      </div>
    </aside>

    <main class="main-content">
      <header class="top-search-bar">
        <div class="pesquisa-wrapper">
          <div class="search-input-container">
            <img class="icone-lupa-input" src="images/icons/icone_lupa.png" alt="Lupa" />
            <input type="text" placeholder="Encontre uma vaga" class="input-busca-real">
          </div>
          <button class="btn-filtrar">
            <img class="icone-filtro" src="images/icons/filtro.png" alt="Filtro" />
            <span>Filtrar</span>
            <img class="seta-selecao" src="images/icons/seta_selecao.png" alt="Seta" />
          </button>
        </div>
        <div class="user-avatar-top">
          <img class="usuario-foto-top" src="images/user/Usuariofoto.png" alt="Avatar Usuário" />
        </div>
      </header>

      <section class="vagas-section">
        <div class="cabecalho-home">
          <h1 class="vagas-em-destaque">Editar Currículo</h1>
          <form action="#" method="post">
            <div class="forms">
              <label for="titulo" class="titulo-campo">Título</label>
              <input type="text" id="titulo" name="titulo">
            </div>

            <div class="forms">
              <label for="descricao" class="titulo-campo">Descrição</label>
              <textarea id="descricao" name="descricao"></textarea>
            </div>

            <div class="forms">
              <h3 class="titulo-campo">Arquivo</h3>
              <label for="anexo" class="btn-anexar">
                <img src="images/icons/PaperclipHorizontal.svg" alt="">
                <span class="subtitulo-botao">Anexar arquivo</span>
              </label>
              <input type="file" id="anexo" name="anexo" accept=".pdf" hidden>
            </div>
            
            <div class="botao-container">
              <button type="submit" class="botao">Enviar</button>
            </div>
          </form>

        </div>
      </section>
    </main>
  </div>
</body>

</html>
