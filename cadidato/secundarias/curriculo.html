<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curriculo - Hirly</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="curriculo">
  <div class="side-bar"></div>
  <img class="logo" src="logo0.svg" />
  <div class="card-usu">
    <img class="usuario-foto" src="usuario-foto0.png" />
    <div class="nome-usuario">&lcub;Nome usuario&rcub;</div>
  </div>
  <div class="log-out-card">
    <img class="sign-out" src="sign-out0.svg" />
    <div class="log-out">Log out</div>
  </div>
  <div class="home">
    <img class="home2" src="home1.svg" />
    <div class="in-co">Iníco</div>
  </div>
  <div class="mensagem">
    <img class="icone-mensagem" src="icone-mensagem0.svg" />
    <div class="mensagem2">Mensagem</div>
  </div>
  <div class="documento">
    <img class="icone-pasta" src="icone-pasta0.svg" />
    <div class="documento2">Documento</div>
  </div>
  <div class="ajuda">
    <img class="icone-ajuda" src="icone-ajuda0.svg" />
    <div class="ajuda2">Ajuda</div>
  </div>
  <div class="outros">Outros</div>
  <div class="configura-es">
    <img class="gear" src="gear0.svg" />
    <div class="configura-es2">Configurações</div>
  </div>
  <div class="servi-os">Serviços</div>
  <div class="pesquisar">
    <img class="icone-lupa" src="icone-lupa0.svg" />
    <div class="pesquisar2">Pesquisar</div>
  </div>
  <div class="insights">
    <img class="icone-dashboard" src="icone-dashboard0.svg" />
    <div class="insights2">Insights</div>
  </div>
  <div class="line-4"></div>
  <div class="line-5"></div>
  <div class="line-7"></div>
  <div class="line-6"></div>
  <div class="principal">Principal</div>
  <div class="tela-home">
    <div class="curr-culo">Currículo</div>
    <div class="nome">
      <div class="t-tulo">Título</div>
      <div class="campo"></div>
    </div>
    <div class="descricao">
      <div class="descricao2">Descrição</div>
      <div class="campo2"></div>
    </div>
    <div class="arquivo">
      <div class="topo">
        <div class="arquivo2">Arquivo</div>
        <div class="addbutton">
          <img class="circulo" src="circulo0.svg" />
        </div>
      </div>
      <div class="campo3"></div>
      <img class="paperclip-horizontal" src="paperclip-horizontal0.svg" />
      <div class="anexar-arquivo">Anexar Arquivo</div>
    </div>
    <div class="barra-pesquisa-2">
      <div class="pesquisa">
        <div class="rectangle-8"></div>
        <div class="encontre-uma-vaga">Encontre uma vaga</div>
        <img class="icone-lupa2" src="icone-lupa1.svg" />
        <img class="icone-filtro" src="icone-filtro0.svg" />
        <div class="filtrar">Filtrar</div>
        <img class="seta-selecao" src="seta-selecao0.svg" />
      </div>
      <div class="card-usu2">
        <img class="usuario-foto2" src="usuario-foto1.png" />
      </div>
    </div>
  </div>
</div>
</body>

</html>
